<!DOCTYPE html>
<html>
<head>
<title>Energy Exam Portal</title>

<style>

body {
    margin: 0;
    font-family: Arial;

    /* 🔴 RCB Gradient Background */
    background: linear-gradient(135deg, #000000, #8B0000, #ff0000, #000000);
    background-size: 400% 400%;

    /* ✨ Animation */
    animation: bgAnimation 10s ease infinite;

    color: white;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: radial-gradient(circle at 50% 20%, rgba(255,0,0,0.2), transparent 60%);
    z-index: -1;
}
/* 🔥 Smooth animated gradient */
@keyframes bgAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
/* HEADER */
.header {
    padding: 60px 20px 20px;
}

.header h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.header p {
    color: #ddd;
    font-size: 18px;
}

/* CARD CONTAINER */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 40px;
    gap: 30px;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    width: 280px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: #00c853;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
}

.btn:hover {
    background: #00a844;
}

/* FOOTER */
.footer {
    margin-top: 60px;
    padding: 20px;
    font-size: 14px;
    color: #bbb;
}

/* MOBILE */
@media(max-width:600px){
    .header h1 {
        font-size: 30px;
    }
}
</style>

</head>

<body>

<div class="header">
    <h1>⚡ Energy Exam Portal</h1>
    <p>Practice MCQs from Weeks 1–8 for A Grade</p>
</div>

<div class="container">

    <div class="card">
        <h2>Week 1–4</h2>
        <p>Energy basics, fossil fuels, economics & finance</p>
        <a href="part1.html" class="btn">Start Test</a>
    </div>

    <div class="card">
        <h2>Week 5–8</h2>
        <p>Environment, sustainability, LCA & impact analysis</p>
        <a href="part2.html" class="btn">Start Test</a>
    </div>

</div>

<div class="footer">
    Built for RCB Fans
</div>

</body>
</html>
