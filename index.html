<!DOCTYPE html>
<html>
<head>
<title>Energy Exam Portal</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #8B0000, #ff0000, #000000);
    background-size: 400% 400%;
    animation: bgAnimation 10s ease infinite;
    color: white;
}

/* Background animation */
@keyframes bgAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* LOGIN SCREEN */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

#login input {
    padding: 12px;
    font-size: 16px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
}

#login button {
    padding: 10px 20px;
    margin-top: 15px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}





/* Header */
.header {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 30vh;
}

.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 10px;
    width: 280px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px;
    background: green;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.footer {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 10vh;
    color: #bbb;
}
</style>
</head>

<body>

<div id="main">


<div class="header">
    <h1>⚡ Energy Exam Portal</h1>
    <p>Practice MCQs from Weeks 1–8 for A Grade</p>
</div>

<div class="container">
    <div class="card">
        <h2>Week 1–4</h2>
        <a href="part1.html" class="btn">Start Test</a>
    </div>

    <div class="card">
        <h2>Week 5–8</h2>
        <a href="part2.html" class="btn">Start Test</a>
    </div>

    <div class="card">
        <h2>PYQ-1</h2>
        <a href="pyq1.html" class="btn">Start Test</a>
    </div>

    <div class="card">
        <h2>PYQ-2</h2>
        <a href="pyq2.html" class="btn">Start Test</a>
    </div>
</div>

</div>


</body>
</html>
