// Limit to 64 questions maximum
let questions = shuffle([...quizData]);
if (questions.length > 64) {
    questions = questions.slice(0, 64);
}

const form = document.getElementById("quizForm");

questions.forEach((q, i) => {
    let div = document.createElement("div");
    div.className = "question";

    let opts = shuffle([...q.o]);

    div.innerHTML = `<p><b>${i + 1}) ${q.q}</b></p>`;
    opts.forEach(o => {
        div.innerHTML += `<label><input type="radio" name="q${i}" value="${o}"> ${o}</label>`;
    });
    div.innerHTML += `<p id="r${i}"></p>`;

    form.appendChild(div);
});

function submitQuiz() {
    let score = 0;

    questions.forEach((q, i) => {
        let sel = document.querySelector(`input[name=q${i}]:checked`);
        let res = document.getElementById(`r${i}`);

        if (sel) {
            if (sel.value === q.a) {
                score++;
                res.innerHTML = "✅ Correct";
                res.className = "correct";
            } else {
                res.innerHTML = "❌ Wrong | Correct: " + q.a;
                res.className = "wrong";
            }
        } else {
            res.innerHTML = "❌ Not Answered | Correct: " + q.a;
            res.className = "wrong";
        }
    });

    document.getElementById("score").innerText = `Final Score: ${score} / ${questions.length}`;
    window.scrollTo(0, document.body.scrollHeight);
}
