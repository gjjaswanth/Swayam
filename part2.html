<!DOCTYPE html>
<html>
<head>
<title>MCQ Exam (Week 5–8)</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:20px;}
h1 { text-align:center;}
.question { background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
.correct { color:green; font-weight:bold;}
.wrong { color:red; font-weight:bold;}
button { padding:12px 25px; font-size:16px; background:green; color:white; border:none; border-radius:6px;}
</style>
</head>

<body>

<h1>MCQ Exam (Week 5–8)</h1>
<form id="quizForm"></form>
<button onclick="submitQuiz()">Submit</button>
<h2 id="score"></h2>

<script>

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

const quizData = [

/* ================= WEEK 5 ================= */
{
q:"What is the impact of \"pre-ignition\" on motive power and pistons in a combustion engine?",
o:["Boosts the motive power and wears down the piston","Boosts the motive power and increases piston life","Causes loss of motive power and increases piston life","Causes loss of motive power and wears down the piston"],
a:"Causes loss of motive power and wears down the piston"
},
{
q:"Sulfur dioxide (SO2) is a primary source of acid rain, forming sulfurous acid (H2SO3) on reaction with water. How many kilograms of slaked lime (Ca(OH)2) are required as a solution for mitigation to the problem of acid rain per kilogram of SO2 formed during the burning of anthracite in a thermal power plant? Molar mass data (g/mol): S: 32 O: 16 H: 1 Ca: 40",
o:["1.156","2.156","3.156","4.156"],
a:"1.156"
},
{
q:"Which of the following compounds was used as an antiknock agent in gasoline?",
o:["Methanol (CH3OH)","Tetraethyl lead (Pb(C2H5)4)","Ethanol (C2H5OH)","Methyl tertiary-butyl ether (MTBE)"],
a:"Tetraethyl lead (Pb(C2H5)4)"
},
{
q:"Which atmospheric layer generally has the highest ozone concentrations?",
o:["Mesosphere","Stratosphere","Troposphere","Earth's surface"],
a:"Stratosphere"
},
{
q:"Which international agreement aimed to reduce the production of CFCs to protect the ozone layer?",
o:["Kyoto Protocol","Montreal Protocol","Vienna Convention","Paris Agreement"],
a:"Montreal Protocol"
},
{
q:"Which of the following gases is NOT a greenhouse gas?",
o:["Carbon dioxide (CO2)","Methane (CH4)","Nitrogen (N2)","Nitrous oxide (N2O)"],
a:"Nitrogen (N2)"
},
{
q:"It is estimated that under standard conditions (1 atm pressure and 298K temperature), the volume of total air in the atmosphere is 6 × 10^18 m^3. The CO2 concentrations in the atmosphere went from 262.16 ppm (parts per million) in 1800 to 410 ppm in 2025 by volume. How many kilograms of extra CO2 were added to the atmosphere from 1800 to 2025 if at STP, 1 kilomole of the gas corresponds to a volume of 22.4 m^3 of the gas? Assume the molar mass of CO2 as 44 g/mol.",
o:["1.742×10^15","1.742×10^14","17.42×10^15","1742×10^15"],
a:"1.742×10^15"
},
{
q:"Which of the following is TRUE about weather and climate?",
o:["Weather results from temporary thermal interactions, and climate is the long-term result of the weather.","Climate results from temporary thermal interactions, and the weather is the long-term result of the climate.","Climate and weather are the same and can be used interchangeably.","None of the above."],
a:"Weather results from temporary thermal interactions, and climate is the long-term result of the weather."
},

/* ================= WEEK 6 ================= */
{
q:"What is the purpose of the Kigali Agreement?",
o:["Increase CO2 emissions","Substitute HFCs with less harmful refrigerants (HFOs)","Promote fossil fuel power plants","Support gasoline economy"],
a:"Substitute HFCs with less harmful refrigerants (HFOs)"
},
{
q:"Which of the following statements is TRUE?",
o:["The current market price of fossil electricity is much higher than renewable electricity","Heavy snowfall in the hilly regions clearly shows that global warming is a myth","Extreme weather phenomena like heavy snowfall, extreme winters, typhoons, etc., can result from global warming","We need to eliminate CO2 from our atmosphere completely"],
a:"Extreme weather phenomena like heavy snowfall, extreme winters, typhoons, etc., can result from global warming"
},
{
q:"Consider the following two statements: Statement 1: Coal mining can cause wildlife disturbance as it causes partial deforestation during site preparation. Statement 2: Temperature increase in water bodies (due to immense heat rejections) has adverse impacts on the aquatic environments and ecology.",
o:["Statement 1 is correct, and Statement 2 is incorrect.","Statement 2 is correct, and Statement 1 is incorrect.","Both statements 1 and 2 are correct.","Both statements 1 and 2 are incorrect."],
a:"Both statements 1 and 2 are correct."
},
{
q:"Which of the following is TRUE regarding nuclear waste?",
o:["Nuclear waste is not radioactive","Accidental release of radioactive materials can make the entire region completely uninhabitable","Nuclear waste disposal is simple and poses no problems to the region","Releasing the nuclear waste into the water bodies is a sustainable waste disposal solution"],
a:"Accidental release of radioactive materials can make the entire region completely uninhabitable"
},
{
q:"What direct environmental issue occurs when warm water from power plants is discharged into rivers or lakes?",
o:["Global warming","Acid rain","Thermal pollution","Water scarcity"],
a:"Thermal pollution"
},
{
q:"What is a primary environmental concern associated with hydraulic fracturing (fracking)?",
o:["Release of oxygen into the air","Increase in agricultural activity","Increase in groundwater purity","Contamination of local water wells"],
a:"Contamination of local water wells"
},
{
q:"Which of the following is/are the environmental concerns associated with strip mining?",
o:["Water runoff pollution","Disturbance to the environment and ecosystem","Release of fine particulates in the atmosphere","All of the above"],
a:"All of the above"
},
{
q:"Consider the following two statements regarding renewable energy: Statement 1: Solar energy is an entirely free-to-use source of renewable energy since the Sun is a free source of energy. Statement 2: Bioethanol production is costly, inefficient, and requires significant water use.",
o:["Statement 1 is correct, and Statement 2 is incorrect.","Statement 2 is correct, and Statement 1 is incorrect.","Both statements 1 and 2 are correct.","Both statements 1 and 2 are incorrect."],
a:"Statement 2 is correct, and Statement 1 is incorrect."
},

/* ================= WEEK 7 ================= */
{
q:"Which of the following statements defines the term \"sustainability\" the best?",
o:["To meet the needs of the present by every possible means","To meet the needs of the future by every possible means","To meet the needs of the present without compromising the needs of the future","To reduce the environmental burdens, no matter the costs"],
a:"To meet the needs of the present without compromising the needs of the future"
},
{
q:"Consider the following two statements regarding sustainability: Statement 1: The problem of sustainability is complex in nature, as it balances several sectors at the same time. Statement 2: Approaches to sustainable engineering involve rigid management and should never emulate natural processes",
o:["Statement 1 is correct, and Statement 2 is incorrect","Statement 2 is correct, and Statement 1 is incorrect","Both statements 1 and 2 are correct","Both statements 1 and 2 are incorrect"],
a:"Statement 1 is correct, and Statement 2 is incorrect"
},
{
q:"Consider the following two statements on life cycle assessment (LCA): Statement 1: The results from an LCA study give us the exact amount of impact a particular process will have on the environment Statement 2: An LCA is a tool to inform decision-makers about the environmental performance of a product",
o:["Statement 1 is correct, and Statement 2 is incorrect","Statement 2 is correct, and Statement 1 is incorrect","Both statements 1 and 2 are correct","Both statements 1 and 2 are incorrect"],
a:"Statement 2 is correct, and Statement 1 is incorrect"
},
{
q:"Which of the following could be a good functional unit of a life cycle assessment (LCA) study on the production of biofuels?",
o:["Kilojoules","Litres","Kilograms","1 litre of biofuel produced daily"],
a:"1 litre of biofuel produced daily"
},
{
q:"What is the purpose of the goal and scope phase in a Life Cycle Assessment (LCA)?",
o:["To directly construct an inventory","To directly provide quantifiable potential impact scores","To provide the intended use of the study and background information","To eliminate environmental impacts"],
a:"To provide the intended use of the study and background information"
},
{
q:"Which of the following statements is/are accurate about the limitations of Life Cycle Assessment (LCA)?",
o:["LCI data collected contains uncertainty","Not a complete assessment of all environmental issues","Sensitivity analysis not fully developed","All of the above"],
a:"All of the above"
},
{
q:"In a unit process X of an LCA study, two products, A (3.5 kg) and B (6.5 kg), are produced. The total economic value of product A is $650, and B is $350. If the total environmental impact score of process X is 100 units, then consider the following statements: Statement 1: Based on mass allocation, the impacts allocated to product A are 65 units, and product B is 35 units. Statement 2: Based on economic allocation, the impacts allocated to product A are 35 units, and product B is 65 units.",
o:["Statement 1 is correct, and Statement 2 is incorrect","Statement 2 is correct, and Statement 1 is incorrect","Both statements 1 and 2 are correct","Both statements 1 and 2 are incorrect"],
a:"Both statements 1 and 2 are incorrect"
},
{
  "q": "Which of the following is a true statement regarding the system boundary in life cycle assessment?",
  "o": [
    "Cradle-to-gate system boundary contains the end-of-life phase, whereas the cradle-to-grave system boundary does not",
    "Cradle-to-grave system boundary contains the end-of-life phase, whereas cradle-to-gate system boundary does not",
    "Both cradle-to-gate and cradle-to-grave system boundaries contain end-of-life phase",
    "Neither of the system boundaries (cradle-to-gate and cradle-to-grave) contains the end-of-life phase"
  ],
  "a": "Cradle-to-grave system boundary contains the end-of-life phase, whereas cradle-to-gate system boundary does not"
},

/* ================= WEEK 8 ================= */
{
q:"Which of the following is considered \"Secondary Data\" in an LCA?",
o:["Data directly measured from a manufacturing process","Data obtained from journal articles and reports","Both (A) and (B)","None of the above"],
a:"Data obtained from journal articles and reports"
},
{
q:"Which of the following impact categories relates to the algal blooms in the water bodies?",
o:["Global Warming Potential (GWP)","Smog Creation Potential (SCP)","Acidification Potential (AP)","Eutrophication Potential (EP)"],
a:"Eutrophication Potential (EP)"
},
{
q:"Which impact category is associated with the potential for chemicals to cause harm to terrestrial ecosystems, such as soil and land-based organisms?",
o:["Acidification Potential (AP)","Terrestrial Ecotoxicity Potential (TEP)","Smog Creation Potential (SCP)","Global Warming Potential (GWP)"],
a:"Terrestrial Ecotoxicity Potential (TEP)"
},
{
q:"What is the most common unit used to report Acidification Potential (AP) in LCA?",
o:["kg CFC11-equivalent","kg CO2-equivalent","kg SO2-equivalent","kg O3-equivalent"],
a:"kg SO2-equivalent"
},
{
q:"What is the primary cause of Eutrophication Potential (EP) in aquatic systems?",
o:["Emissions of carbon dioxide (CO2)","Ground-level ozone formation","Particulate matter from combustion processes","Nutrient overloads from nitrogen and phosphorus"],
a:"Nutrient overloads from nitrogen and phosphorus"
},
{
q:"If a process emits 100 kg of CO2 and 2 kg of methane (with a GWP of 25), and 1 kg of N2O (with a GWP of 298), what is the total emission from this process?",
o:["400 kg CO2 equivalent","448 kg CO2 equivalent","324 kg CO2 equivalent","103 kg CO2 equivalent"],
a:"448 kg CO2 equivalent"
},
{
q:"In an LCA study, company X produces 1000 units of a product with 2000 kg CO2 eq emissions, and company Y produces 5 units of the same product with 30 kg CO2 eq emissions. If the functional unit of this LCA study is 1 unit of the product, which company is more environmentally sustainable?",
o:["Company X","Company Y","Both are equally sustainable","Not enough data to comment"],
a:"Company X"
},
{
q:"If the production of 40 units of a certain commodity has a total environmental impact score of 1000, what is the environmental impact score for a single commodity?",
o:["1000","40000","40","25"],
a:"25"
}

];

const questions = shuffle([...quizData]);
const form = document.getElementById("quizForm");

questions.forEach((q,i)=>{
let div=document.createElement("div");
div.className="question";
let opts=shuffle([...q.o]);

div.innerHTML=`<p>${i+1}) ${q.q}</p>`;
opts.forEach(o=>{
div.innerHTML+=`<label><input type="radio" name="q${i}" value="${o}">${o}</label><br>`;
});
div.innerHTML+=`<p id="r${i}"></p>`;
form.appendChild(div);
});

function submitQuiz(){
let score=0;
questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);
let res=document.getElementById(`r${i}`);

if(sel){
if(sel.value===q.a){
score++;
res.innerHTML="✅ Correct";
res.className="correct";
}else{
res.innerHTML="❌ Wrong | Correct: "+q.a;
res.className="wrong";
}
}else{
res.innerHTML="❌ Not Answered | Correct: "+q.a;
res.className="wrong";
}
});

document.getElementById("score").innerText=
`Final Score: ${score} / ${questions.length}`;
}

</script>

</body>
</html>
